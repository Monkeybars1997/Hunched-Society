<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunched Society | DROP 001</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        .heading-font { font-family: 'Outfit', sans-serif; letter-spacing: 1px; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-black text-[#d4d4d8] selection:bg-[#d946ef] selection:text-black">
    
    <nav class="fixed w-full z-50 top-0 bg-black/90 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between border-b border-[#d946ef]/50">
            <div class="text-2xl heading-font font-black uppercase flex items-center gap-2">
                <span class="text-[#d946ef]">HUNCHED</span>
                <span class="text-white">SOCIETY</span>
            </div>
            
            <div class="hidden md:flex gap-8 text-xs font-bold tracking-widest uppercase text-zinc-500">
                <a href="index.html" class="hover:text-[#d946ef] transition-colors">THE LAB (CYBER)</a>
                <a href="product.html" class="hover:text-[#d946ef] transition-colors">THE SHOE (EARTH)</a>
                <a href="launch.html" class="text-[#d946ef] transition-colors">DROP 001 (HYPER)</a>
            </div>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col items-center justify-center px-6 pt-20 relative">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[#d946ef] rounded-full mix-blend-screen filter blur-[200px] opacity-30"></div>

        <div class="relative z-10 text-center w-full max-w-4xl">
            <h2 class="text-[#d946ef] font-bold tracking-[0.3em] uppercase mb-4 heading-font">Classified // Limited Run</h2>
            
            <h1 class="text-[12vw] md:text-[150px] heading-font font-black text-white leading-none uppercase mb-2">
                DROP <span class="text-[#d946ef]">001</span>
            </h1>
            
            <p class="text-2xl md:text-3xl text-white mb-16 heading-font font-bold">
                50 PAIRS. ZERO RESTOCKS.
            </p>

            <div class="flex justify-center gap-4 md:gap-8 mb-16 heading-font font-black text-4xl md:text-6xl text-white">
                </div>
                <span>:</span>
                <div class="flex flex-col items-center">
                    <span id="hours">00</span>
                    <span class="text-xs text-[#d946ef] tracking-widest mt-2 font-sans font-bold">HOURS</span>
                </div>
                <span>:</span>
                <div class="flex flex-col items-center">
                    <span id="mins">00</span>
                    <span class="text-xs text-[#d946ef] tracking-widest mt-2 font-sans font-bold">MINS</span>
                </div>
                <span>:</span>
                <div class="flex flex-col items-center">
                    <span id="secs">00</span>
                    <span class="text-xs text-[#d946ef] tracking-widest mt-2 font-sans font-bold">SECS</span>
                </div>
            </div>

            <!-- Waitlist Form -->
            <form class="flex flex-col md:flex-row gap-4 max-w-2xl mx-auto">
                <input type="email" placeholder="SECURE YOUR SPOT [EMAIL]" class="flex-1 bg-zinc-900 border-2 border-zinc-800 focus:border-[#d946ef] rounded-none px-6 py-4 text-white uppercase tracking-widest outline-none font-bold">
                <button type="button" class="bg-[#d946ef] text-black heading-font font-black text-2xl px-12 py-4 hover:bg-white transition-colors">
                    ENTER
                </button>
            </form>
        </div>
    </section>

    <script>
        const dropDate = new Date().getTime() + (30 * 24 * 60 * 60 * 1000);

        setInterval(function() {
            const now = new Date().getTime();
            const distance = dropDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = days.toString().padStart(2, '0');
            document.getElementById("hours").innerHTML = hours.toString().padStart(2, '0');
            document.getElementById("mins").innerHTML = minutes.toString().padStart(2, '0');
            document.getElementById("secs").innerHTML = seconds.toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
