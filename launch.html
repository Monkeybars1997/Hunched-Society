<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunched Society | DROP 001</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- New Font: Outfit & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* Unified typography */
        h1, h2, h3, .heading-font { font-family: 'Outfit', sans-serif; }
        body { font-family: 'Inter', sans-serif; background-color: #000; }
    </style>
</head>
<body class="min-h-screen text-zinc-50 selection:bg-[#d946ef] selection:text-black overflow-x-hidden">
    
    <nav class="fixed w-full z-50 top-0 border-b border-zinc-800 bg-black/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="text-2xl font-black tracking-tighter uppercase flex items-center gap-2 heading-font">
                <span class="text-[#d946ef]">HUNCHED</span>
                <span>SOCIETY</span>
            </div>
            
            <div class="hidden md:flex gap-8 text-sm font-medium tracking-wide text-zinc-400">
                <a href="index.html" class="hover:text-[#d946ef] transition-colors">THE LAB (CYBER)</a>
                <a href="product.html" class="hover:text-[#d946ef] transition-colors">THE SHOE (EARTH)</a>
                <a href="launch.html" class="text-[#d946ef] transition-colors">DROP 001 (HYPER)</a>
            </div>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col items-center justify-center px-6 pt-20 relative">
        <!-- FIXED: Replaced expensive blur with a performance-friendly radial gradient -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[radial-gradient(circle_at_center,rgba(217,70,239,0.25)_0%,transparent_70%)] rounded-full mix-blend-screen pointer-events-none"></div>

        <div class="relative z-10 text-center w-full max-w-4xl">
            <h2 class="text-[#d946ef] font-bold tracking-[0.3em] uppercase mb-4 heading-font">Classified // Limited Run</h2>
            
            <h1 class="text-[12vw] md:text-[150px] heading-font font-black text-white leading-none uppercase mb-2">
                DROP <span class="text-[#d946ef]">001</span>
            </h1>
            
            <p class="text-2xl md:text-3xl text-white mb-16 heading-font font-bold">
                50 PAIRS. ZERO RESTOCKS.
            </p>

            <!-- FIXED: Restored the 'Days' element to stop the Javascript error -->
            <div class="flex justify-center items-start gap-3 md:gap-6 mb-16 heading-font font-black text-4xl md:text-6xl text-white">
                <div class="flex flex-col items-center">
                    <span id="days">00</span>
                    <span class="text-xs text-[#d946ef] tracking-widest mt-2 font-sans font-bold">DAYS</span>
                </div>
                <span>:</span>
                <div class="flex flex-col items-center">
                    <span id="hours">00</span>
                    <span class="text-xs text-[#d946ef] tracking-widest mt-2 font-sans font-bold">HOURS</span>
                </div>
                <span>:</span>
                <div class="flex flex-col items-center">
                    <span id="mins">00</span>
                    <span class="text-xs text-[#d946ef] tracking-widest mt-2 font-sans font-bold">MINS</span>
                </div>
                <span>:</span>
                <div class="flex flex-col items-center">
                    <span id="secs">00</span>
                    <span class="text-xs text-[#d946ef] tracking-widest mt-2 font-sans font-bold">SECS</span>
                </div>
            </div>

            <!-- Waitlist Form -->
            <form class="flex flex-col md:flex-row gap-4 max-w-2xl mx-auto">
                <input type="email" placeholder="SECURE YOUR SPOT [EMAIL]" class="flex-1 bg-zinc-900 border-2 border-zinc-800 focus:border-[#d946ef] rounded-none px-6 py-4 text-white uppercase tracking-widest outline-none font-bold">
                <button type="button" class="bg-[#d946ef] text-black heading-font font-black text-2xl px-12 py-4 hover:bg-white transition-colors">
                    ENTER
                </button>
            </form>
        </div>
    </section>

    <script>
  // Set the exact date and time for the Hunched Society drop
  const countDownDate = new Date("Aug 30, 2026 00:00:00").getTime();

  // Update the countdown every 1 second
  const timerInterval = setInterval(function() {

    // Get today's date and time
    const now = new Date().getTime();

    // Find the distance between now and the countdown date
    const distance = countDownDate - now;

    // Time calculations for days, hours, minutes, and seconds
    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60 * 60)) / 1000);

    // Display the result in the element with id="countdown"
    // (Make sure your HTML text element has id="countdown")
    document.getElementById("countdown").innerHTML = days + "d " + hours + "h " 
    + minutes + "m " + seconds + "s ";

    // If the countdown is finished, display a message
    if (distance < 0) {
      clearInterval(timerInterval);
      document.getElementById("countdown").innerHTML = "THE DROP IS LIVE";
    }
  }, 1000);
</script>
</body>
</html>
